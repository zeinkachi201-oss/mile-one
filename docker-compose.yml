version: '3.8'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: runclub
      POSTGRES_USER: runclub
      POSTGRES_PASSWORD: runclub
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  postgres_data:
